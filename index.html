<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lembra Aí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1EC;
    --surface:#FFFFFF;
    --ink:#14201C;
    --ink-soft:#5C665F;
    --primary:#256D5B;   /* local */
    --primary-tint:#DDEAE5;
    --secondary:#4C5FD5; /* horário */
    --secondary-tint:#E3E5FA;
    --accent:#E8A33D;    /* CTA */
    --accent-tint:#FBEBD2;
    --line:#DCE1D9;
    --danger:#C24E3A;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:28px 12px;
  }
  .device{
    width:390px;
    max-width:100%;
    background:var(--surface);
    border-radius:36px;
    box-shadow:0 30px 60px -20px rgba(20,32,28,0.35), 0 0 0 1px rgba(20,32,28,0.04);
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    height:800px;
  }
  .statusbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 24px 4px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
  }
  header.app-header{
    padding:6px 24px 18px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex;align-items:baseline;justify-content:space-between;
  }
  .brand h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:26px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand h1 span{color:var(--primary);}
  .today-date{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .subline{
    margin-top:6px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .subline b{color:var(--primary);font-weight:600;}

  main{
    flex:1;
    overflow-y:auto;
    padding:20px 20px 100px;
    position:relative;
  }
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
  .empty-state .glyph{
    font-size:34px;margin-bottom:10px;
  }
  .empty-state h3{
    font-family:'Fraunces',serif;
    font-size:19px;color:var(--ink);margin:0 0 6px;
  }
  .empty-state p{font-size:13px;line-height:1.5;margin:0;}

  .trail{
    position:relative;
    padding-left:34px;
  }
  .trail::before{
    content:'';
    position:absolute;
    left:13px;top:6px;bottom:6px;
    width:2px;
    background:repeating-linear-gradient(to bottom, var(--line) 0 6px, transparent 6px 11px);
  }
  .node{
    position:relative;
    margin-bottom:16px;
    animation: pop .35s ease;
  }
  @keyframes pop{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .node .dot{
    position:absolute;
    left:-34px; top:14px;
    width:28px;height:28px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;
    background:var(--surface);
    border:2px solid var(--line);
    z-index:2;
  }
  .node.local .dot{border-color:var(--primary); color:var(--primary); background:var(--primary-tint);}
  .node.horario .dot{border-color:var(--secondary); color:var(--secondary); background:var(--secondary-tint);}
  .node.anytime .dot{border-color:var(--ink-soft); color:var(--ink-soft);}
  .node.arrived .dot{background:var(--accent); border-color:var(--accent); color:#fff;}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .node.done .card{opacity:0.45;}
  .node.done .task-text{text-decoration:line-through;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .task-text{font-size:14.5px;font-weight:500;line-height:1.35;}
  .meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    display:flex;align-items:center;gap:5px;
  }
  .badge-arrived{
    font-size:10.5px;
    font-weight:600;
    background:var(--accent);
    color:#fff;
    padding:2px 8px;
    border-radius:20px;
    letter-spacing:0.02em;
  }
  .check-btn{
    width:24px;height:24px;border-radius:50%;
    border:1.5px solid var(--line);
    background:none;flex-shrink:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:transparent;font-size:13px;
    transition:.15s;
  }
  .node.done .check-btn{
    background:var(--primary);border-color:var(--primary);color:#fff;
  }

  .fab{
    position:absolute;
    right:20px; bottom:88px;
    width:56px;height:56px;
    border-radius:50%;
    background:var(--ink);
    color:#fff;
    border:none;
    font-size:26px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 12px 24px -8px rgba(20,32,28,0.5);
  }

  nav.bottom{
    display:flex;
    border-top:1px solid var(--line);
    background:var(--surface);
  }
  nav.bottom button{
    flex:1;
    border:none;background:none;
    padding:12px 0 16px;
    font-family:'Inter',sans-serif;
    font-size:11px;font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  nav.bottom button.active{color:var(--primary);}
  nav.bottom .icon{font-size:18px;}

  /* Sheet */
  .sheet-backdrop{
    position:absolute;inset:0;
    background:rgba(20,32,28,0.35);
    display:none;
    z-index:10;
  }
  .sheet-backdrop.show{display:block;}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;
    background:var(--surface);
    border-radius:24px 24px 0 0;
    padding:22px 22px 26px;
    transform:translateY(100%);
    transition:transform .28s ease;
    z-index:11;
  }
  .sheet.show{transform:translateY(0);}
  .sheet h2{
    font-family:'Fraunces',serif;font-size:19px;margin:0 0 14px;
  }
  .sheet label{
    font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-soft);
    display:block;margin:14px 0 6px;
  }
  .sheet input[type=text], .sheet input[type=time]{
    width:100%;padding:11px 13px;
    border:1.5px solid var(--line);border-radius:12px;
    font-family:'Inter',sans-serif;font-size:14.5px;
    background:var(--bg);
  }
  .type-toggle{display:flex;gap:8px;}
  .type-toggle button{
    flex:1;padding:10px 4px;border-radius:12px;border:1.5px solid var(--line);
    background:var(--bg);font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;
  }
  .type-toggle button.sel.local{border-color:var(--primary);color:var(--primary);background:var(--primary-tint);}
  .type-toggle button.sel.horario{border-color:var(--secondary);color:var(--secondary);background:var(--secondary-tint);}
  .type-toggle button.sel.anytime{border-color:var(--ink);color:var(--ink);background:var(--bg);}
  .loc-row{
    display:flex;gap:8px;align-items:center;margin-top:8px;
  }
  .loc-btn{
    flex-shrink:0;
    padding:11px 14px;border-radius:12px;border:none;
    background:var(--primary);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;
    white-space:nowrap;
  }
  .loc-status{font-size:11.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .save-btn{
    margin-top:20px;width:100%;padding:14px;border:none;border-radius:14px;
    background:var(--ink);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;
  }
  .hint{
    font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.4;
  }
  .close-x{
    position:absolute;right:20px;top:18px;background:none;border:none;font-size:18px;color:var(--ink-soft);cursor:pointer;
  }

  /* Settings tab */
  .settings-block{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-bottom:14px;
  }
  .settings-block h4{margin:0 0 4px;font-family:'Fraunces',serif;font-size:15.5px;}
  .settings-block p{margin:0;font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
  .tag-soon{
    display:inline-block;margin-top:8px;font-size:10.5px;font-weight:700;
    background:var(--accent-tint);color:#9C6A16;padding:3px 9px;border-radius:20px;letter-spacing:0.03em;
  }
  .status-row{display:flex;justify-content:space-between;align-items:center;}
  .dotstate{width:9px;height:9px;border-radius:50%;background:var(--primary);}
  .dotstate.off{background:var(--danger);}
</style>
</head>
<body>

<div class="device">
  <div class="statusbar"><span id="clock">09:41</span><span>●●●●  📶  🔋</span></div>

  <header class="app-header">
    <div class="brand">
      <h1>Lembra<span>Aí</span></h1>
      <span class="today-date" id="todayDate"></span>
    </div>
    <div class="subline" id="subline">Carregando sua trilha...</div>
  </header>

  <main id="mainTrail">
    <!-- filled by JS -->
  </main>

  <button class="fab" id="fabAdd">+</button>

  <nav class="bottom">
    <button class="active" data-tab="trilha"><span class="icon">🧭</span>Trilha</button>
    <button data-tab="ajustes"><span class="icon">⚙️</span>Ajustes</button>
  </nav>

  <!-- Sheet: add task -->
  <div class="sheet-backdrop" id="backdrop"></div>
  <div class="sheet" id="sheet">
    <button class="close-x" id="closeSheet">✕</button>
    <h2>Novo lembrete</h2>

    <label>O que você precisa lembrar?</label>
    <input type="text" id="taskText" placeholder="Ex: Levar o carregador">

    <label>Quando avisar</label>
    <div class="type-toggle">
      <button data-type="anytime" class="sel anytime">Sem gatilho</button>
      <button data-type="horario">Por horário</button>
      <button data-type="local">Por local</button>
    </div>

    <div id="horarioField" style="display:none;">
      <label>Horário</label>
      <input type="time" id="taskTime">
    </div>

    <div id="localField" style="display:none;">
      <label>Local</label>
      <div class="loc-row">
        <input type="text" id="placeName" placeholder="Nome do lugar (ex: Casa)">
        <button class="loc-btn" id="useLocBtn">📍 Usar aqui</button>
      </div>
      <div class="loc-status" id="locStatus">Toque em "Usar aqui" no local desejado.</div>
      <div class="hint">O app vai avisar quando você chegar a ~150m deste ponto (com a aba aberta).</div>
    </div>

    <button class="save-btn" id="saveTask">Salvar lembrete</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'tasks';
let tasks = [];
let selectedType = 'anytime';
let pendingCoords = null;
let watchId = null;

const mainTrail = document.getElementById('mainTrail');
const subline = document.getElementById('subline');

function fmtDate(){
  const d = new Date();
  const opts = { weekday:'short', day:'2-digit', month:'short' };
  return d.toLocaleDateString('pt-BR', opts).toUpperCase();
}
document.getElementById('todayDate').textContent = fmtDate();

function updateClock(){
  const d = new Date();
  document.getElementById('clock').textContent =
    d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
updateClock(); setInterval(updateClock, 30000);

async function loadTasks(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    tasks = res ? JSON.parse(res.value) : [];
  }catch(e){
    tasks = [];
  }
  render();
}

async function saveTasks(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(tasks));
  }catch(e){ console.error('Erro ao salvar', e); }
}

function iconFor(type){
  if(type==='local') return '📍';
  if(type==='horario') return '⏰';
  return '✦';
}

function render(){
  const pending = tasks.filter(t=>!t.done).length;
  subline.innerHTML = pending>0
    ? `Você tem <b>${pending}</b> lembrete${pending>1?'s':''} na trilha de hoje`
    : `Trilha livre. Toque em + para adicionar algo.`;

  if(tasks.length===0){
    mainTrail.innerHTML = `
      <div class="empty-state">
        <div class="glyph">🧭</div>
        <h3>Sua trilha está vazia</h3>
        <p>Adicione um lembrete por local, horário ou sem gatilho — e ele aparece aqui na ordem do seu dia.</p>
      </div>`;
    return;
  }

  const sorted = [...tasks].sort((a,b)=>(a.done?1:0)-(b.done?1:0));

  mainTrail.innerHTML = `<div class="trail">${sorted.map(t=>`
    <div class="node ${t.type} ${t.done?'done':''} ${t.arrived?'arrived':''}" data-id="${t.id}">
      <div class="dot">${iconFor(t.type)}</div>
      <div class="card">
        <div class="card-top">
          <div class="task-text">${escapeHtml(t.text)}</div>
          <button class="check-btn" data-action="toggle" data-id="${t.id}">✓</button>
        </div>
        <div class="meta">
          ${t.type==='local' ? `📍 ${escapeHtml(t.place||'Local salvo')}` : ''}
          ${t.type==='horario' ? `⏰ ${t.time}` : ''}
          ${t.type==='anytime' ? `Sem gatilho — aparece na trilha` : ''}
          ${t.arrived ? `<span class="badge-arrived">Chegou!</span>` : ''}
        </div>
      </div>
    </div>
  `).join('')}</div>`;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

mainTrail.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action="toggle"]');
  if(!btn) return;
  const id = btn.dataset.id;
  const t = tasks.find(x=>x.id===id);
  if(t){ t.done = !t.done; saveTasks(); render(); }
});

// ---- Sheet handling ----
const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');
document.getElementById('fabAdd').addEventListener('click', openSheet);
document.getElementById('closeSheet').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

function openSheet(){
  backdrop.classList.add('show');
  sheet.classList.add('show');
}
function closeSheet(){
  backdrop.classList.remove('show');
  sheet.classList.remove('show');
  document.getElementById('taskText').value='';
  document.getElementById('placeName').value='';
  document.getElementById('taskTime').value='';
  pendingCoords = null;
  document.getElementById('locStatus').textContent = 'Toque em "Usar aqui" no local desejado.';
  selectType('anytime');
}

document.querySelectorAll('.type-toggle button').forEach(b=>{
  b.addEventListener('click', ()=> selectType(b.dataset.type));
});
function selectType(type){
  selectedType = type;
  document.querySelectorAll('.type-toggle button').forEach(b=>{
    b.classList.toggle('sel', b.dataset.type===type);
  });
  document.getElementById('horarioField').style.display = type==='horario' ? 'block' : 'none';
  document.getElementById('localField').style.display = type==='local' ? 'block' : 'none';
}

document.getElementById('useLocBtn').addEventListener('click', ()=>{
  const status = document.getElementById('locStatus');
  if(!navigator.geolocation){
    status.textContent = 'Geolocalização não suportada neste navegador.';
    return;
  }
  status.textContent = 'Obtendo sua localização...';
  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      pendingCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      status.textContent = `✓ Local capturado (±${Math.round(pos.coords.accuracy)}m)`;
    },
    (err)=>{
      status.textContent = 'Não foi possível obter localização: ' + err.message;
    },
    { enableHighAccuracy:true, timeout:10000 }
  );
});

document.getElementById('saveTask').addEventListener('click', ()=>{
  const text = document.getElementById('taskText').value.trim();
  if(!text){ return; }

  const task = {
    id: 't_' + Date.now(),
    text, type: selectedType, done:false, arrived:false
  };

  if(selectedType==='horario'){
    const time = document.getElementById('taskTime').value;
    if(!time){ alert('Escolha um horário.'); return; }
    task.time = time;
  }
  if(selectedType==='local'){
    if(!pendingCoords){ alert('Capture a localização primeiro, tocando em "Usar aqui".'); return; }
    task.place = document.getElementById('placeName').value.trim() || 'Local salvo';
    task.lat = pendingCoords.lat;
    task.lng = pendingCoords.lng;
    startWatching();
  }

  tasks.push(task);
  saveTasks();
  render();
  closeSheet();
});

// ---- Geofencing (works while tab is open) ----
function haversine(lat1, lng1, lat2, lng2){
  const R = 6371000;
  const toRad = d => d * Math.PI/180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function startWatching(){
  if(watchId !== null || !navigator.geolocation) return;
  watchId = navigator.geolocation.watchPosition((pos)=>{
    const { latitude, longitude } = pos.coords;
    let changed = false;
    tasks.forEach(t=>{
      if(t.type==='local' && !t.done && !t.arrived){
        const dist = haversine(latitude, longitude, t.lat, t.lng);
        if(dist <= 150){
          t.arrived = true;
          changed = true;
          notify(t);
        }
      }
    });
    if(changed){ saveTasks(); render(); }
  }, ()=>{}, { enableHighAccuracy:true, maximumAge:15000 });
}

function notify(task){
  if('Notification' in window){
    if(Notification.permission === 'granted'){
      new Notification('Lembra Aí 📍', { body: task.text });
    } else if(Notification.permission !== 'denied'){
      Notification.requestPermission().then(p=>{
        if(p==='granted') new Notification('Lembra Aí 📍', { body: task.text });
      });
    }
  }
}

// ---- Tabs ----
const tabButtons = document.querySelectorAll('nav.bottom button');
tabButtons.forEach(b=>{
  b.addEventListener('click', ()=>{
    tabButtons.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    if(b.dataset.tab==='trilha'){ render(); document.getElementById('fabAdd').style.display='flex'; }
    else{ renderSettings(); document.getElementById('fabAdd').style.display='none'; }
  });
});

function renderSettings(){
  mainTrail.innerHTML = `
    <div class="settings-block">
      <div class="status-row">
        <h4>Localização</h4>
        <span class="dotstate" id="geoDot"></span>
      </div>
      <p>Usada para avisar quando você chega perto de um local salvo. Funciona enquanto o app está aberto no navegador.</p>
    </div>
    <div class="settings-block">
      <h4>Captura por WhatsApp</h4>
      <p>Mande um áudio ou texto pro número do Lembra Aí e vira lembrete automaticamente — sem precisar abrir o app.</p>
      <span class="tag-soon">Em breve</span>
    </div>
    <div class="settings-block">
      <h4>Lembrete inteligente</h4>
      <p>Se você ignorar um aviso duas vezes, o app pergunta se ainda é importante — em vez de insistir sem parar.</p>
      <span class="tag-soon">Em breve</span>
    </div>
    <div class="settings-block">
      <h4>Seus dados</h4>
      <p>Tudo fica salvo só na sua conta. Nenhum dado de localização é compartilhado.</p>
    </div>
  `;
  const dot = document.getElementById('geoDot');
  if(navigator.permissions){
    navigator.permissions.query({name:'geolocation'}).then(p=>{
      dot.classList.toggle('off', p.state !== 'granted');
    }).catch(()=>{});
  }
}

// init
loadTasks();
</script>
</body>
</html>
